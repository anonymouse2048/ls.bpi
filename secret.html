<!DOCTYPE html>
<html>
<head>
    <title>Lapburn Spanaxeess</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 45%, #374151 100%);
            color: #f7f7f2;
            text-align: center;
            padding: 40px 20px 60px;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 44px;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            color: #f4d35e;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e5c24b;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            margin: 18px auto;
            padding: 22px 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
            color: #2d2d2d;
            opacity: 0;
            transform: translate3d(0, 22px, 0) scale(0.985);
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: opacity, transform;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .card.show {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(1);
        }

        .card {
            cursor: pointer;
        }

        .card:hover {
            transform: translate3d(0, -3px, 0) scale(1);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
            border-color: #f4d35e;
        }

        .card h2 {
            margin-bottom: 6px;
            font-size: 24px;
            color: #333333;
        }

        .role {
            color: #b8860b;
            font-size: 15px;
            font-weight: 700;
        }

        .bio {
            margin-top: 10px;
            color: #666666;
            font-size: 14px;
            line-height: 1.5;
        }

        button {
            margin-top: 24px;
            padding: 11px 22px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #f4d35e, #e0b31f);
            color: #2a2a2a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(224, 179, 31, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(224, 179, 31, 0.25);
            filter: brightness(1.03);
        }

        .editor-card {
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid #e5c24b;
            border-radius: 20px;
            width: 100%;
            max-width: 520px;
            margin: 20px auto 28px;
            padding: 22px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            color: #2f2f2f;
            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .editor-card h3 {
            margin-top: 0;
            color: #b8860b;
        }

        .editor-card input,
        .editor-card textarea {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            font-family: inherit;
        }

        .editor-card textarea {
            min-height: 80px;
            resize: vertical;
        }

        .editor-card .row {
            margin-bottom: 12px;
        }

        .editor-card .add-btn {
            margin-top: 8px;
            padding: 10px 16px;
            font-size: 14px;
        }

        .editor-card .delete-btn {
            margin: 4px 0 12px;
            padding: 8px 12px;
            font-size: 13px;
            background: #555;
            color: white;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid #e5c24b;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            margin: 20px auto 28px;
            padding: 28px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
            color: #2f2f2f;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hidden {
            display: none;
        }

    </style>
</head>

<body>

<h1 id="pageTitle">Lapburn Spanaxeess</h1>

<div id="editorPanel" class="editor-card hidden">
    <h3>Edit Directory</h3>
    <label>Page Title</label>
    <input id="titleInput" type="text" placeholder="Page title" />
    <div id="peopleEditor"></div>
    <button type="button" class="add-btn" id="addPersonBtn">Add one more employee</button>
    <button type="button" id="saveBtn">Save Changes</button>
</div>

<div id="directoryView">
    <div id="directoryList"></div>
</div>

<div id="profileView" class="hidden">
    <div class="profile-card">
        <h2 id="profileName"></h2>
        <div id="profileRole" class="role"></div>
        <div id="profileBio" class="bio"></div>
        <button type="button" id="homeBtn">Home</button>
    </div>
</div>

<button onclick="logout()">Logout</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
}

const userRole = localStorage.getItem("userRole") || "viewer";
const editorPanel = document.getElementById("editorPanel");
const pageTitle = document.getElementById("pageTitle");
const titleInput = document.getElementById("titleInput");
const peopleEditor = document.getElementById("peopleEditor");
const directoryList = document.getElementById("directoryList");
const directoryView = document.getElementById("directoryView");
const profileView = document.getElementById("profileView");
const profileName = document.getElementById("profileName");
const profileRole = document.getElementById("profileRole");
const profileBio = document.getElementById("profileBio");
const saveBtn = document.getElementById("saveBtn");
const addPersonBtn = document.getElementById("addPersonBtn");
const homeBtn = document.getElementById("homeBtn");
const landingPage = "index.html";

let ticking = false;
let supabaseClient = null;

function initRemoteStorage() {
    const url = window.SUPABASE_URL;
    const key = window.SUPABASE_ANON_KEY;

    if (!url || !key) {
        return false;
    }

    try {
        supabaseClient = window.supabase.createClient(url, key);
        return true;
    } catch (error) {
        console.warn("Remote storage unavailable:", error);
        return false;
    }
}

initRemoteStorage();

function revealCards() {
    const cards = document.querySelectorAll('.card');
    const startLine = window.innerHeight * 0.9;
    const endLine = window.innerHeight * 0.12;

    cards.forEach((card, index) => {
        const rect = card.getBoundingClientRect();
        const inView = rect.top < startLine && rect.bottom > endLine;

        if (inView) {
            if (!card.classList.contains('show')) {
                card.style.transitionDelay = `${index * 60}ms`;
                card.classList.add('show');
            }
        } else if (rect.bottom < 0 || rect.top > window.innerHeight) {
            card.classList.remove('show');
        }
    });
}

function handleScroll() {
    if (!ticking) {
        window.requestAnimationFrame(() => {
            revealCards();
            ticking = false;
        });
        ticking = true;
    }
}

window.addEventListener('scroll', handleScroll, { passive: true });
window.addEventListener('resize', handleScroll);

if (userRole === "editor" && editorPanel) {
    editorPanel.classList.remove("hidden");
}

function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("userRole");
    window.location.href = landingPage;
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;");
}

function getDirectoryData() {
    const saved = localStorage.getItem("directoryData");
    if (saved) {
        return JSON.parse(saved);
    }

    return {
        title: "Lapburn Spanaxeess",
        people: [
            {
                name: "Ayan Saraf",
                role: "The Manager of B.P. International",
                bio: "Ayan is the manager and leads the organization with clarity and direction."
            },
            {
                name: "Vihaan Revelli",
                role: "Director of Finance",
                bio: "Vihaan oversees financial planning and keeps the organization’s operations strong."
            }
        ]
    };
}

async function saveDirectoryData(data) {
    localStorage.setItem("directoryData", JSON.stringify(data));

    if (supabaseClient) {
        const { error } = await supabaseClient
            .from("directory_data")
            .upsert({ id: 1, data })
            .select();

        if (error) {
            console.warn("Could not save remotely:", error);
        }
    }
}

async function loadDirectoryData() {
    if (supabaseClient) {
        const { data, error } = await supabaseClient
            .from("directory_data")
            .select("data")
            .eq("id", 1)
            .single();

        if (!error && data && data.data) {
            localStorage.setItem("directoryData", JSON.stringify(data.data));
            return data.data;
        }
    }

    return getDirectoryData();
}

function showDirectoryView() {
    directoryView.classList.remove("hidden");
    profileView.classList.add("hidden");
    directoryView.style.opacity = "0";
    setTimeout(() => {
        directoryView.style.transition = "opacity 0.35s ease";
        directoryView.style.opacity = "1";
    }, 10);
}

function showProfileView(person) {
    profileName.textContent = person.name;
    profileRole.textContent = person.role;
    profileBio.textContent = person.bio || "";
    directoryView.classList.add("hidden");
    profileView.classList.remove("hidden");
    profileView.style.opacity = "0";
    setTimeout(() => {
        profileView.style.transition = "opacity 0.35s ease";
        profileView.style.opacity = "1";
    }, 10);
}

function renderDirectory(data) {
    if (pageTitle) {
        pageTitle.textContent = data.title;
    }
    if (titleInput) {
        titleInput.value = data.title;
    }

    if (directoryList) {
        directoryList.innerHTML = data.people.map((person, index) => `
            <div class="card" data-index="${index}">
                <h2>${escapeHtml(person.name)}</h2>
                <div class="role">${escapeHtml(person.role)}</div>
            </div>
        `).join("");
    }

    requestAnimationFrame(revealCards);
}

function setupEditor(data) {
    if (peopleEditor) {
        peopleEditor.innerHTML = data.people.map((person) => `
            <div class="row">
                <label>Name</label>
                <input class="nameInput" type="text" value="${escapeHtml(person.name)}" />
                <label>Role</label>
                <input class="roleInput" type="text" value="${escapeHtml(person.role)}" />
                <label>Bio</label>
                <textarea class="bioInput">${escapeHtml(person.bio || "")}</textarea>
                <button type="button" class="delete-btn">Delete Employee</button>
            </div>
        `).join("");
    }
}

async function loadPage() {
    const data = await loadDirectoryData();
    renderDirectory(data);
    setupEditor(data);
    showDirectoryView();
}

if (homeBtn) {
    homeBtn.addEventListener("click", showDirectoryView);
}

directoryList.addEventListener("click", function (event) {
    const card = event.target.closest(".card");
    if (!card) return;

    const data = getDirectoryData();
    const index = Number(card.getAttribute("data-index"));
    if (data.people[index]) {
        showProfileView(data.people[index]);
    }
});

if (userRole === "editor") {
    if (addPersonBtn) {
        addPersonBtn.addEventListener("click", function () {
            if (peopleEditor) {
                peopleEditor.insertAdjacentHTML("beforeend", `
                    <div class="row">
                        <label>Name</label>
                        <input class="nameInput" type="text" placeholder="Employee name" />
                        <label>Role</label>
                        <input class="roleInput" type="text" placeholder="Employee role" />
                        <label>Bio</label>
                        <textarea class="bioInput" placeholder="Employee bio"></textarea>
                        <button type="button" class="delete-btn">Delete Employee</button>
                    </div>
                `);
            }
        });
    }

    if (saveBtn) {
        saveBtn.addEventListener("click", async function () {
            const data = {
                title: titleInput.value.trim() || "Lapburn Spanaxeess",
                people: Array.from(peopleEditor.querySelectorAll('.row')).map(row => ({
                    name: row.querySelector('.nameInput').value.trim() || "Unknown",
                    role: row.querySelector('.roleInput').value.trim() || "Role",
                    bio: row.querySelector('.bioInput').value.trim() || ""
                }))
            };

            await saveDirectoryData(data);
            renderDirectory(data);
            setupEditor(data);
            alert("Changes saved for everyone to see.");
        });
    }

    peopleEditor.addEventListener("click", function (event) {
        if (event.target.classList.contains("delete-btn")) {
            event.target.closest('.row').remove();
        }
    });
}

loadPage();

</script>

</body>
</html>
